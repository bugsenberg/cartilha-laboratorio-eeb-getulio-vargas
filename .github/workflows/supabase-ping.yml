name: Supabase Keep Alive

on:
  schedule:
    # Executa a cada 3 dias (às 08:00 horário de Brasília = 11:00 UTC)
    - cron: '0 11 */3 * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase - cartilha_relatos
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}" \
            -X GET \
            "https://sacyjmzswdweddqrfgae.supabase.co/rest/v1/cartilha_relatos?limit=1" \
            -H "apikey: sb_publishable_41C1A1PgyWjLtiQZmrBr-g_NIuS8MTc" \
            -H "Authorization: Bearer sb_publishable_41C1A1PgyWjLtiQZmrBr-g_NIuS8MTc"

      - name: Ping Supabase - cartilha_acessos
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}" \
            -X GET \
            "https://sacyjmzswdweddqrfgae.supabase.co/rest/v1/cartilha_acessos?limit=1" \
            -H "apikey: sb_publishable_41C1A1PgyWjLtiQZmrBr-g_NIuS8MTc" \
            -H "Authorization: Bearer sb_publishable_41C1A1PgyWjLtiQZmrBr-g_NIuS8MTc"

      - name: Confirmar ping
        run: echo "✅ Ping enviado ao Supabase com sucesso!"
